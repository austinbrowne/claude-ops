# claude-triage.yml — Reusable workflow: triage newly opened issues
#
# Called by target repos via workflow_call.
# Required caller repo variables: CLAUDE_OPS_HOME, TARGET_NAME

name: Claude Triage (Reusable)

on:
  workflow_call:
    inputs:
      target_name:
        required: true
        type: string
      issue_number:
        required: true
        type: string

concurrency:
  group: claude-ops-${{ inputs.target_name }}-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: self-hosted
    permissions:
      contents: read
      issues: write
    steps:
      - name: Validate claude-ops path
        run: |
          if [[ ! -d "$CLAUDE_OPS_HOME" ]] || [[ ! -f "$CLAUDE_OPS_HOME/config.json" ]]; then
            echo "::error::CLAUDE_OPS_HOME is not set or invalid: $CLAUDE_OPS_HOME"
            exit 1
          fi
        env:
          CLAUDE_OPS_HOME: ${{ vars.CLAUDE_OPS_HOME }}

      - name: Triage issue #${{ inputs.issue_number }}
        run: |
          "$CLAUDE_OPS_HOME/scripts/dispatch.sh" \
            --role product-manager \
            --target "$TARGET_NAME" \
            --task "Triage issue #${ISSUE_NUMBER}: Read the issue, categorize (bug/feature), prioritize (priority:high/medium/low), and mark ready_for_dev or needs_refinement."
        env:
          CLAUDE_OPS_HOME: ${{ vars.CLAUDE_OPS_HOME }}
          TARGET_NAME: ${{ inputs.target_name }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}

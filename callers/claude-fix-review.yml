# claude-fix-review.yml — Caller for claude-ops fix-review
# Place in your repo's .github/workflows/ directory
# Required repo variables: CLAUDE_OPS_HOME, TARGET_NAME
# Optional: set CLAUDE_OPS_ENABLED=false to disable

name: Claude Fix Review

on:
  pull_request_review:
    types: [submitted]

jobs:
  fix-review:
    if: vars.CLAUDE_OPS_ENABLED != 'false' && github.event.review.state == 'changes_requested' && github.event.pull_request.head.repo.fork == false
    uses: dazz-ops/claude-ops/.github/workflows/claude-fix-review.yml@main
    with:
      target_name: ${{ vars.TARGET_NAME }}
      pr_number: ${{ github.event.pull_request.number }}
      pr_branch: ${{ github.event.pull_request.head.ref }}
